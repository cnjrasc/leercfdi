<head> 
  <meta charset="UTF-8"> 
  <title>Formulario de Cotización</title> 
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"> 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css"> 
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script> 
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js"></script> 
  <script> $(document).ready(function() { $("#id_Fecha_de_Elaboración").datepicker({ format: 'dd-mm-yyyy', autoclose: true }); }); </script>
</head>
<form enctype="multipart/form-data" method="post">
    {% csrf_token %}
    {% for campo in formulario %}
    <div class="mb-3">
      <label for="" class="form-label">{{ campo.label}}:</label>
      {% if campo.field.widget.input_type == "select" %} 
       <select 
       class="form-control" 
       name="{{ campo.name }}" 
       id="id_{{ campo.name }}" 
       aria-describedby="helpId"> 
       <option value="" selected>{{ campo.field.empty_label }}</option>
       {% for choice in campo.field.queryset %} 
       <option value="{{ choice.pk }}" {% if campo.value == choice.pk %}selected{% endif %}>{{ choice }}</option> 
       {% endfor %} 
     </select> 
     {% else %} 
       <input 
       type="{{ campo.field.widget.input_type }}" 
       class="form-control" 
       name="{{ campo.name }}" 
       id="id_{{ campo.name }}" 
       aria-describedby="helpId" 
       placeholder="{{ campo.label }}" 
       value="{{ campo.value|default:'' }}" 
       step="0.01"
       type="date" 
       /> 
     {% endif %} 
      
       </div>
      <div class="col-12 help-text"> {{campo.errors}} </div>
    {% endfor %}
    
    <input name="" id="" class="btn btn-success" type="submit" value="Enviar">
       <a name="" id="" class="btn btn-primary" href="{% url 'cfdi' %}" role="button">Cancelar</a>
    </form>
